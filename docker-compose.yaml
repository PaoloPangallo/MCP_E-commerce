version: '3.8'

services:
  # Redis per caching e session memory
  redis:
    image: redis:alpine
    container_name: mcp-redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - mcp-network

  # Qdrant come Vector DB per il sistema RAG
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mcp-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: always
    networks:
      - mcp-network

  # Database Relazionale (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: mcp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pangallo
      POSTGRES_DB: mcp_ecom
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge

volumes:
  postgres_data:
